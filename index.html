<!DOCTYPE html>
<html>
<head>
    <title>Slope | Zeitsite</title>
    <link rel="icon" href="slope.png">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="TemplateData/unityloader41.js"></script>

    <style>
        /* Terminal look */
        #terminalScreen {
            position: fixed;
            inset: 0;
            background: black;
            color: #00ff55;
            font-family: "Courier New", monospace;
            padding: 20px;
            z-index: 999999;
            display: flex;
            flex-direction: column;
        }

        #terminalOutput {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 18px;
        }

        #terminalInput {
            width: 100%;
            background: black;
            border: none;
            outline: none;
            color: #00ff55;
            font-family: inherit;
            font-size: 18px;
        }

        .crt {
            text-shadow: 0 0 5px #00ff55;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

<!-- TERMINAL ACCESS SCREEN -->
<div id="terminalScreen" class="crt">
    <div id="terminalOutput"></div>
    <div>
        <span>> </span><input id="terminalInput" autocomplete="off">
    </div>
</div>

<!-- UNITY GAME -->
<div class="webgl-content">
    <div id="gameContainer" style="width: 100%; height: 100%; margin: 0;"></div>
</div>

<script>
let gameInstance;
const ACCESS_CODE = "1234"; // change this

const output = document.getElementById("terminalOutput");
const input = document.getElementById("terminalInput");

function print(text) {
    output.textContent += text + "\n";
    output.scrollTop = output.scrollHeight;
}

function bootSequence() {
    const lines = [
        "ZEITSITE",
        "Initializing system...",
        "..",
        "..",
        "System ready.",
        "",
        "Type /help for commands."
    ];

    let i = 0;
    function next() {
        if (i < lines.length) {
            print(lines[i]);
            i++;
            setTimeout(next, 300);
        }
    }
    next();
}

bootSequence();

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const cmd = input.value.trim();
        input.value = "";
        handleCommand(cmd);
    }
});

function handleCommand(cmd) {
    print("> " + cmd);

    if (cmd === "/help") {
        print("Available commands:");
        print("/help - show this menu");
        print("/clear - clear terminal");
        print("/viewcode - view access code");
        print("/unlock - enter unlock mode");
        return;
    }

    if (cmd === "/clear") {
        output.textContent = "";
        return;
    }

    if (cmd === "/viewcode") {
        print("Access code is: " + ACCESS_CODE);
        return;
    }

    if (cmd === "/unlock") {
        print("Enter access code:");
        waitForCode();
        return;
    }

    print("Unknown command. Type /help");
}

function waitForCode() {
    input.onkeydown = function(e) {
        if (e.key === "Enter") {
            const code = input.value.trim();
            input.value = "";
            if (code === ACCESS_CODE) {
                print("Access granted.");
                setTimeout(() => {
                    document.getElementById("terminalScreen").remove();
                    loadUnity();
                }, 500);
            } else {
                print("Incorrect code.");
            }
        }
    };
}

function loadUnity() {
    gameInstance = UnityLoader.instantiate("gameContainer", "Build/slope.json", {
        onProgress: UnityProgress,
        Module: {
            onRuntimeInitialized: function() {
                UnityProgress(gameInstance, "complete");
            }
        }
    });
}
</script>

</body>
</html>
